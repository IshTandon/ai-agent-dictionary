name: Fetch Daily AI News

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch AI news
        run: node scripts/fetch-news.mjs

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily AI news"
