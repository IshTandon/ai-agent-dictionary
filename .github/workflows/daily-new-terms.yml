name: Daily New Terms

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate new AI terms
        run: node scripts/generate-new-terms.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Fetch latest AI news
        run: node scripts/fetch-news.mjs

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: add daily new terms and update news"
          file_pattern: "content/terms/*.json content/news/*.json"
